name: CI
on: [push, pull_request]
permissions: { contents: read }
jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: game_inventory
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U app -d game_inventory"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      matrix: { node-version: [20, 22] }
    env:
      PGUSER: app
      PGPASSWORD: ci_pass
      PGDATABASE: game_inventory
      SESSION_COOKIE_SECURE: "false"
      APP_ORIGIN: http://127.0.0.1:3000
      APP_VERSION: 0.13.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "${{ matrix.node-version }}"
          cache: npm
      - run: npm ci
      - run: npm --prefix integrations/playstation-sidecar ci --ignore-scripts
      - run: npm --prefix integrations/nintendo-sidecar ci --ignore-scripts
      - run: DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@127.0.0.1:5432/${PGDATABASE}" npm run db:migrate
      - run: DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@127.0.0.1:5432/${PGDATABASE}" npm run verify
      - run: python3 scripts/secret_scan.py --tracked
